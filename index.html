<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Expense Tracker Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F172A">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366F1;
            --primary-gradient: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
            --secondary: #10B981;
            --danger: #FF4757;
            --warning: #FFA502;
            --bg-dark: #070B14;
            --card-dark: #121826;
            --text-dark: #F8FAFC;
            --text-muted-dark: #94A3B8;
            --bg-light: #F8FAFC;
            --card-light: #FFFFFF;
            --text-light: #0F172A;
            --text-muted-light: #64748B;
            --nav-height: 75px;
            --safe-area-bottom: env(safe-area-inset-bottom);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-dark);
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s;
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: calc(var(--nav-height) + 40px + var(--safe-area-bottom));
            line-height: 1.6;
        }

        body.light-mode {
            background-color: var(--bg-light);
            color: var(--text-light);
            --glass: rgba(0, 0, 0, 0.02);
            --glass-border: rgba(0, 0, 0, 0.05);
        }

        /* --- Animations --- */
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* --- Layout --- */
        .container { padding: 0 20px; max-width: 500px; margin: 0 auto; }
        .hidden { display: none !important; }

        /* --- Premium Cards --- */
        .card {
            background: var(--card-dark);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .light-mode .card {
            background: var(--card-light);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.05);
            border: 1px solid #F1F5F9;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }

        /* --- Header --- */
        header {
            padding: 25px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(7, 11, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .light-mode header { background: rgba(248, 250, 252, 0.8); }
        .app-logo-text { font-size: 24px; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .header-btns { display: flex; gap: 12px; }
        .icon-circle {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: inherit;
            transition: all 0.2s;
        }
        .icon-circle:active { transform: scale(0.9); background: var(--glass-border); }

        /* --- Dashboard --- */
        .balance-card {
            background: var(--primary-gradient);
            color: white;
            text-align: center;
            padding: 35px 20px;
            border: none;
        }
        .balance-label { font-size: 14px; opacity: 0.8; font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .balance-amount { font-size: 42px; font-weight: 800; margin-bottom: 20px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .stat-item { background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 20px; backdrop-filter: blur(5px); }
        .stat-label { font-size: 12px; opacity: 0.7; margin-bottom: 4px; }
        .stat-value { font-size: 16px; font-weight: 700; }

        /* --- Section Titles --- */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding: 0 5px;
        }
        .section-title { font-size: 18px; font-weight: 700; }
        .view-all { font-size: 13px; color: var(--primary); font-weight: 600; text-decoration: none; cursor: pointer; }

        /* --- Expense List --- */
        .expense-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: var(--glass);
            border-radius: 22px;
            margin-bottom: 12px;
            border: 1px solid var(--glass-border);
            animation: slideUp 0.4s ease backwards;
        }
        .light-mode .expense-item { background: #F8FAFC; border: 1px solid #F1F5F9; }
        .cat-icon {
            width: 50px; height: 50px;
            border-radius: 16px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 20px;
            color: white;
            box-shadow: 0 8px 15px rgba(99, 102, 241, 0.2);
        }
        .exp-details { flex: 1; }
        .exp-name { font-weight: 700; font-size: 16px; margin-bottom: 2px; }
        .exp-meta { font-size: 12px; color: var(--text-muted-dark); font-weight: 500; }
        .light-mode .exp-meta { color: var(--text-muted-light); }
        .exp-amount-group { text-align: right; }
        .exp-amount { font-weight: 800; font-size: 16px; color: var(--danger); }
        .exp-amount.positive { color: var(--secondary); }

        /* --- Navigation --- */
        .bottom-nav {
            position: fixed;
            bottom: 20px; left: 20px; right: 20px;
            height: var(--nav-height);
            background: rgba(18, 24, 38, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 25px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            border: 1px solid var(--glass-border);
            z-index: 2000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .light-mode .bottom-nav { background: rgba(255, 255, 255, 0.9); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted-dark);
            cursor: pointer;
            width: 55px; height: 55px;
            border-radius: 18px;
            transition: all 0.3s;
        }
        .light-mode .nav-item { color: var(--text-muted-light); }
        .nav-item.active { color: white; background: var(--primary-gradient); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3); }
        .nav-item svg { width: 22px; height: 22px; }
        .nav-label { font-size: 10px; font-weight: 700; margin-top: 4px; display: none; }
        .nav-item.active .nav-label { display: block; }

        /* --- Floating Action Button --- */
        .fab {
            position: fixed;
            bottom: 110px; right: 25px;
            width: 65px; height: 65px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            z-index: 1500;
            border: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fab:active { transform: scale(0.85) rotate(90deg); }

        /* --- Calculator --- */
        .calc-screen {
            background: #000;
            border-radius: 24px;
            padding: 30px;
            text-align: right;
            margin-bottom: 20px;
            border: 1px solid #222;
        }
        .calc-history { font-size: 16px; color: #666; min-height: 24px; margin-bottom: 10px; font-weight: 500; }
        .calc-main { font-size: 48px; font-weight: 800; color: white; overflow: hidden; }
        .calc-keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .key {
            aspect-ratio: 1;
            border-radius: 22px;
            border: none;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            background: #1A1F2C;
            color: white;
        }
        .light-mode .key { background: #F1F5F9; color: #0F172A; }
        .key:active { transform: scale(0.9); opacity: 0.8; }
        .key.operator { background: #2D3548; color: var(--primary); }
        .key.action { background: var(--primary-gradient); color: white; }
        .key.double { grid-column: span 1; }

        /* --- Progress Bars --- */
        .progress-wrapper { margin-top: 20px; }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; font-weight: 600; }
        .progress-track { height: 12px; background: var(--glass); border-radius: 10px; overflow: hidden; border: 1px solid var(--glass-border); }
        .progress-fill { height: 100%; background: var(--primary-gradient); border-radius: 10px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 3000;
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
        .modal-content {
            background: var(--card-dark);
            width: 100%;
            max-width: 500px;
            border-radius: 35px 35px 0 0;
            padding: 30px;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
        }
        .light-mode .modal-content { background: var(--card-light); }
        
        /* --- Forms --- */
        .input-group { margin-bottom: 20px; }
        .input-label { display: block; font-size: 13px; font-weight: 700; color: var(--text-muted-dark); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .light-mode .input-label { color: var(--text-muted-light); }
        .custom-input {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 16px 20px;
            color: inherit;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: all 0.2s;
        }
        .custom-input:focus { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }
        
        .pill-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .cat-pill {
            padding: 10px 18px;
            border-radius: 15px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cat-pill.active { background: var(--primary-gradient); color: white; border: none; transform: scale(1.05); }

        .btn-primary {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: var(--primary-gradient);
            color: white;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            transition: all 0.2s;
        }
        .btn-primary:active { transform: scale(0.96); }

        /* --- Toast --- */
        #toast {
            position: fixed;
            top: 30px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 700;
            z-index: 5000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* --- Chart Customization --- */
        .chart-box { height: 280px; width: 100%; margin: 10px 0; }

        /* --- Profile --- */
        .profile-hero { text-align: center; padding: 20px 0; }
        .avatar-glow {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: var(--primary-gradient);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 800;
            color: white;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.5);
            position: relative;
        }
        .avatar-glow::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            opacity: 0.3;
        }
        .profile-name { font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        .profile-tag { font-size: 14px; color: var(--text-muted-dark); font-weight: 600; }

        .settings-group { margin-top: 30px; }
        .settings-link {
            display: flex;
            align-items: center;
            padding: 20px;
            background: var(--glass);
            border-radius: 22px;
            margin-bottom: 12px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.2s;
        }
        .settings-link:active { background: var(--glass-border); transform: translateX(5px); }
